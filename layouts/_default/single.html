{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ if .Date }}<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>{{ end }}
{{ if .Params.tags }}<span class="tags">{{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}</span>{{ end }}
{{ .Content }}
{{ end }}
